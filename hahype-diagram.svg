<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 560" fill="none">
  <rect width="1140" height="560" fill="#000000"/>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8 Z" fill="#c8f07a"/>
    </marker>
    <marker id="au" markerWidth="10" markerHeight="8" refX="4" refY="0" orient="auto">
      <path d="M0 8 L4 0 L8 8 Z" fill="#c8f07a"/>
    </marker>
  </defs>

  <style>
    .box { fill: #080808; stroke: #3d5a1e; stroke-width: 1.5; stroke-dasharray: 6 3; rx: 8; }
    .box-hl { fill: #0d1a04; stroke: #c8f07a; stroke-width: 2; rx: 10; }
    .lbl { fill: #c8f07a; font-family: monospace; font-size: 9px; letter-spacing: 1.5px; }
    .ttl { fill: #e8e8e8; font-family: sans-serif; font-size: 17px; font-weight: 700; }
    .ttl-lg { fill: #e8e8e8; font-family: sans-serif; font-size: 20px; font-weight: 700; }
    .sub { fill: #9a9a9a; font-family: sans-serif; font-size: 11.5px; }
    .flow { fill: #c8f07a; font-family: monospace; font-size: 10.5px; font-style: italic; }
    .pct { fill: #c8f07a; font-family: monospace; font-size: 11px; font-weight: 600; }
  </style>

  <!-- ════ LEFT COLUMN ════ -->

  <!-- BOX: User Deposit HYPE -->
  <rect class="box" x="30" y="240" width="155" height="100"/>
  <text class="lbl" x="108" y="266" text-anchor="middle">USER</text>
  <text class="ttl-lg" x="108" y="296" text-anchor="middle">Deposit HYPE</text>
  <text class="sub" x="108" y="316" text-anchor="middle">HyperEVM wallet</text>

  <!-- ARROW → Vault -->
  <line x1="185" y1="290" x2="248" y2="290" stroke="#c8f07a" stroke-width="1.5" marker-end="url(#a)"/>
  <text class="flow" x="200" y="282">deposit</text>

  <!-- BOX: Harmonix Vault -->
  <rect class="box" x="250" y="225" width="190" height="130"/>
  <text class="lbl" x="345" y="255" text-anchor="middle">VAULT</text>
  <text class="ttl-lg" x="345" y="284" text-anchor="middle">Harmonix</text>
  <text class="ttl-lg" x="345" y="310" text-anchor="middle">Vault</text>
  <text class="sub" x="345" y="335" text-anchor="middle">ERC-4626 · Automates strategy</text>

  <!-- ARROW ↑ Vault → Receipt Token -->
  <path d="M345 225 L345 148" stroke="#c8f07a" stroke-width="1.5" fill="none" marker-end="url(#au)"/>
  <text class="flow" x="355" y="190">user receives</text>

  <!-- BOX: Receipt Token haHYPE/kHYPE -->
  <rect class="box" x="240" y="48" width="210" height="95"/>
  <text class="lbl" x="345" y="76" text-anchor="middle">RECEIPT TOKEN</text>
  <text class="ttl-lg" x="345" y="106" text-anchor="middle">haHYPE / kHYPE</text>
  <text class="sub" x="345" y="128" text-anchor="middle">ERC-4626</text>

  <!-- ════ COLLATERAL PATH (downward) ════ -->

  <!-- ARROW ↓ Vault → Felix -->
  <path d="M345 355 L345 408" stroke="#c8f07a" stroke-width="1.5" fill="none" marker-end="url(#a)" transform="rotate(90 345 381)"/>
  <path d="M345 355 L345 398" stroke="#c8f07a" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text class="flow" x="355" y="380">collateral</text>

  <!-- BOX: Felix Protocol — Mint feUSD -->
  <rect class="box" x="250" y="400" width="190" height="105"/>
  <text class="lbl" x="345" y="425" text-anchor="middle">FELIX PROTOCOL</text>
  <text class="ttl" x="345" y="452" text-anchor="middle">Mint feUSD</text>
  <text class="sub" x="345" y="472" text-anchor="middle">HYPE as collateral</text>
  <text class="sub" x="345" y="490" text-anchor="middle">CDP mechanism</text>

  <!-- ARROW → Swap -->
  <line x1="440" y1="450" x2="498" y2="450" stroke="#c8f07a" stroke-width="1.5" marker-end="url(#a)"/>
  <text class="flow" x="452" y="442">swap</text>

  <!-- BOX: feUSD → USDC swap -->
  <rect class="box" x="500" y="405" width="170" height="95"/>
  <text class="lbl" x="585" y="430" text-anchor="middle">SWAP</text>
  <text class="ttl" x="585" y="457" text-anchor="middle">feUSD → USDC</text>
  <text class="sub" x="585" y="480" text-anchor="middle">Short hedge basis</text>

  <!-- ════ CAPITAL SPLIT ════ -->

  <!-- Vertical split line from swap box up -->
  <text class="flow" x="700" y="328" transform="rotate(-90 700 340)">capital split</text>

  <!-- ARROW upper fork → Short HYPE -->
  <path d="M670 440 L710 440 L710 180 L748 180" stroke="#c8f07a" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text class="pct" x="718" y="270">PERPS — 50%</text>

  <!-- ARROW lower fork → Buy Back -->
  <path d="M670 460 L710 460 L710 440 L710 440" stroke="#c8f07a" stroke-width="1" fill="none"/>
  <!-- Already sharing the vertical line, just need the lower branch -->
  <path d="M710 440 L710 460 L748 460" stroke="#c8f07a" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text class="pct" x="718" y="420">SPOT — 50%</text>

  <!-- BOX: Short HYPE (Perps) -->
  <rect class="box" x="750" y="130" width="185" height="100"/>
  <text class="ttl" x="843" y="165" text-anchor="middle">Short HYPE</text>
  <text class="sub" x="843" y="188" text-anchor="middle">HyperCore perpetuals</text>
  <text class="sub" x="843" y="206" text-anchor="middle">Positive funding capture</text>

  <!-- BOX: Buy Back + Restake (Spot) -->
  <rect class="box" x="750" y="405" width="185" height="110"/>
  <text class="ttl" x="843" y="438" text-anchor="middle">Buy Back +</text>
  <text class="ttl" x="843" y="460" text-anchor="middle">Restake</text>
  <text class="sub" x="843" y="482" text-anchor="middle">HyperEVM DEXs</text>
  <text class="sub" x="843" y="500" text-anchor="middle">Lending · Pendle · Kinetiq</text>

  <!-- ARROW: Perps → Funding Rate -->
  <line x1="935" y1="180" x2="968" y2="180" stroke="#c8f07a" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ARROW: Spot → Ecosystem Yield -->
  <line x1="935" y1="460" x2="968" y2="460" stroke="#c8f07a" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- BOX: Funding Rate -->
  <rect class="box" x="970" y="135" width="160" height="90"/>
  <text class="lbl" x="1050" y="158" text-anchor="middle">YIELD SOURCE</text>
  <text class="ttl" x="1050" y="185" text-anchor="middle">Funding Rate</text>
  <text class="sub" x="1050" y="206" text-anchor="middle">Longs pay shorts</text>
  <text class="sub" x="1050" y="220" text-anchor="middle">3.8–4% APY</text>

  <!-- BOX: Ecosystem Yield -->
  <rect class="box" x="970" y="410" width="160" height="105"/>
  <text class="lbl" x="1050" y="433" text-anchor="middle">YIELD SOURCE</text>
  <text class="ttl" x="1050" y="460" text-anchor="middle">Ecosystem Yield</text>
  <text class="sub" x="1050" y="482" text-anchor="middle">Pendle · Kinetiq · Lending</text>
  <text class="sub" x="1050" y="498" text-anchor="middle">+ partner protocol points</text>

  <!-- ════ NET APY BOX ════ -->

  <!-- ARROWS → APY box -->
  <path d="M1050 225 L1050 265" stroke="#c8f07a" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M1050 410 L1050 365" stroke="#c8f07a" stroke-width="1.5" fill="none" marker-end="url(#au)"/>

  <!-- BOX: Net APY (highlight) -->
  <rect class="box-hl" x="1000" y="270" width="100" height="95"/>
  <text class="lbl" x="1050" y="293" text-anchor="middle">NET APY</text>
  <text fill="#e8e8e8" font-family="sans-serif" font-size="36" font-weight="800" x="1050" y="332" text-anchor="middle">3.8–</text>
  <text fill="#e8e8e8" font-family="sans-serif" font-size="30" font-weight="800" x="1050" y="356" text-anchor="middle">4%</text>

</svg>