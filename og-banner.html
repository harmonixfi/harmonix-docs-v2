<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden;font-family:'Inter',sans-serif}
.banner{width:1200px;height:630px;background:linear-gradient(160deg,#071a10 0%,#0d2818 20%,#16432a 50%,#1e6b3a 80%,#247a42 100%);display:flex;align-items:center;justify-content:space-between;padding:0 80px;position:relative;overflow:hidden}
.banner::after{content:'';position:absolute;inset:0;opacity:0.06;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.left{position:relative;z-index:1;max-width:580px}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:40px}
.logo svg{height:32px;width:auto}
.logo span{font-size:24px;font-weight:700;color:#fff}
h1{font-size:64px;font-weight:800;color:#fff;line-height:1;letter-spacing:-3px;margin-bottom:20px}
p{font-size:20px;color:rgba(255,255,255,0.5);line-height:1.5;max-width:460px;margin-bottom:36px}
.stats{display:flex;gap:40px}
.stat-val{font-size:28px;font-weight:800;color:#fff;letter-spacing:-1px}
.stat-lbl{font-size:11px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}
.right{position:relative;z-index:1;display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.card{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:18px 24px;min-width:280px;backdrop-filter:blur(8px)}
.card-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.card-name .dot{width:8px;height:8px;border-radius:50%;background:#43a047}
.card-apy{font-size:24px;font-weight:800;color:#43a047;letter-spacing:-0.5px}
.card-meta{font-size:12px;color:rgba(255,255,255,0.3);margin-top:4px}
.glow{position:absolute;top:50%;right:15%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(67,160,71,0.15),transparent 70%);pointer-events:none;transform:translateY(-50%)}
</style>
</head>
<body>
<div class="banner">
  <div class="glow"></div>
  <div class="left">
    <div class="logo">
      <svg viewBox="0 0 146 28" xmlns="http://www.w3.org/2000/svg"><g><g><path fill="rgba(255,255,255,0.9)" d="M25,3.4c-5.9-3.4-11.3,1-15.2,7.9L3.3,7.5c-4,6.9-5.1,13.7,0.8,17.1s11.3-1,15.2-7.9l6.5,3.7C29.8,13.6,30.9,6.8,25,3.4z M18.2,16.1c-2.3,4-5.1,6.7-7.8,5.1c-2.7-1.5-1.7-5.3,0.6-9.3s5.1-6.7,7.8-5.2C21.4,8.3,20.5,12.1,18.2,16.1z"/></g><path fill="rgba(255,255,255,0.9)" d="M73.9,24.5c-1.1,0-2.1-0.7-2.6-1.6c-0.3,0.3-0.6,0.5-1,0.7c-1,0.6-2.1,0.8-3.3,0.8c-1.2,0-2.3-0.3-3.3-0.8c-1-0.6-1.8-1.4-2.3-2.3c-0.6-1-0.8-2.1-0.8-3.3c0-1.2,0.3-2.3,0.8-3.2c0.6-1,1.4-1.7,2.3-2.3c1-0.6,2.1-0.9,3.3-0.9s2.3,0.3,3.3,0.8c0.2,0.1,0.5,0.3,0.7,0.5v-1.3h3L73.9,24.5z M58.7,21c0,1.9-1.5,3.5-3.5,3.5v-9.3h-9.9V21c0,1.9-1.5,3.5-3.5,3.5V7c0-1.9,1.5-3.5,3.5-3.5V12h9.9V7c0-1.9,1.5-3.5,3.5-3.5z"/></g></svg>
    </div>
    <h1>DeFi Yield<br>Products Onchain</h1>
    <p>Delta neutral yield bearing stablecoins on Hyperliquid. Secure, automated, institutional-grade.</p>
    <div class="stats">
      <div><div class="stat-val">$7M</div><div class="stat-lbl">AUM</div></div>
      <div><div class="stat-val">13,110</div><div class="stat-lbl">Users</div></div>
      <div><div class="stat-val">7%+</div><div class="stat-lbl">APY</div></div>
      <div><div class="stat-val">3</div><div class="stat-lbl">Audits</div></div>
    </div>
  </div>
  <div class="right">
    <div class="card">
      <div class="card-name"><span class="dot"></span>haUSDC</div>
      <div class="card-apy">7.0% APY</div>
      <div class="card-meta">TVL $2.4M &middot; Delta Neutral</div>
    </div>
    <div class="card">
      <div class="card-name"><span class="dot"></span>haHYPE</div>
      <div class="card-apy">8.1% APY</div>
      <div class="card-meta">TVL $3.1M &middot; Yield Compound</div>
    </div>
    <div class="card">
      <div class="card-name"><span class="dot" style="background:#42a5f5"></span>Basis Trade</div>
      <div class="card-apy" style="color:#64b5f6">7.0% APY</div>
      <div class="card-meta">TVL $2.4M &middot; Funding Rates</div>
    </div>
  </div>
</div>
</body>
</html>
