<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 520" fill="none">
  <rect width="1140" height="520" fill="none"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8 Z" fill="#34C759"/>
    </marker>
    <marker id="arr-up" markerWidth="10" markerHeight="8" refX="4" refY="0" orient="auto">
      <path d="M0 8 L4 0 L8 8 Z" fill="#34C759"/>
    </marker>
    <marker id="arr-down" markerWidth="8" markerHeight="10" refX="4" refY="9" orient="auto">
      <path d="M0 0 L4 10 L8 0 Z" fill="#34C759"/>
    </marker>
    <marker id="arr-left" markerWidth="10" markerHeight="8" refX="1" refY="4" orient="auto">
      <path d="M10 0 L0 4 L10 8 Z" fill="#34C759"/>
    </marker>
  </defs>

  <style>
    .box { fill: #ffffff; stroke: #c5dcc8; stroke-width: 1.5; stroke-dasharray: 6 3; rx: 8; }
    .box-hl { fill: #e8f7ea; stroke: #34C759; stroke-width: 2; rx: 10; }
    .lbl { fill: #34C759; font-family: 'Aeonik', sans-serif; font-size: 9px; letter-spacing: 1.5px; }
    .ttl { fill: #173132; font-family: 'Aeonik', sans-serif; font-size: 17px; font-weight: 700; }
    .ttl-lg { fill: #173132; font-family: 'Aeonik', sans-serif; font-size: 20px; font-weight: 700; }
    .sub { fill: #5a7a6a; font-family: 'Aeonik', sans-serif; font-size: 11.5px; }
    .flow { fill: #34C759; font-family: 'Aeonik Mono', monospace; font-size: 10.5px; font-style: italic; }
    .pct { fill: #173132; font-family: 'Aeonik Mono', monospace; font-size: 11px; font-weight: 600; }
  </style>

  <!-- BOX 1: User Deposits -->
  <rect class="box" x="30" y="200" width="160" height="110"/>
  <text class="lbl" x="110" y="228" text-anchor="middle">USER</text>
  <text class="ttl" x="110" y="255" text-anchor="middle">Deposit</text>
  <text class="ttl" x="110" y="278" text-anchor="middle">USDC or USDe</text>
  <text class="sub" x="110" y="298" text-anchor="middle">ERC-7575 multi-asset</text>

  <!-- ARROW → Vault -->
  <line x1="190" y1="255" x2="238" y2="255" stroke="#34C759" stroke-width="1.5" marker-end="url(#arr)"/>
  <text class="flow" x="197" y="246">deposit</text>

  <!-- BOX 2: Harmonix Vault -->
  <rect class="box" x="240" y="185" width="190" height="130"/>
  <text class="lbl" x="335" y="215" text-anchor="middle">VAULT</text>
  <text class="ttl-lg" x="335" y="244" text-anchor="middle">Harmonix</text>
  <text class="ttl-lg" x="335" y="270" text-anchor="middle">Vault</text>
  <text class="sub" x="335" y="292" text-anchor="middle">ERC-4626 · 7540 · 7575</text>

  <!-- ARROW ↑ Vault → Receipt Token -->
  <path d="M335 185 L335 118" stroke="#34C759" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text class="flow" x="345" y="155">user receives</text>

  <!-- BOX: Receipt Token -->
  <rect class="box" x="240" y="30" width="190" height="85"/>
  <text class="lbl" x="335" y="55" text-anchor="middle">RECEIPT TOKEN</text>
  <text class="ttl-lg" x="335" y="82" text-anchor="middle">haUSDC</text>
  <text class="sub" x="335" y="102" text-anchor="middle">ERC-4626 · 7540 · 7575</text>

  <!-- Split label -->
  <text class="flow" x="465" y="220" transform="rotate(-90 465 250)">capital split</text>

  <!-- ARROW upper fork → Perps -->
  <path d="M430 240 L490 240 L490 140 L568 140" stroke="#34C759" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text class="pct" x="500" y="180">PERPS — 50%</text>

  <!-- ARROW lower fork → Spot -->
  <path d="M430 265 L490 265 L490 380 L568 380" stroke="#34C759" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text class="pct" x="500" y="345">SPOT — 50%</text>

  <!-- BOX: Short Positions -->
  <rect class="box" x="570" y="90" width="195" height="105"/>
  <text class="ttl" x="668" y="125" text-anchor="middle">Short Positions</text>
  <text class="sub" x="668" y="148" text-anchor="middle">HyperCore perpetuals</text>
  <text class="sub" x="668" y="166" text-anchor="middle">Positive funding capture</text>

  <!-- BOX: HIP-3 Spot + Lending -->
  <rect class="box" x="570" y="325" width="195" height="110"/>
  <text class="ttl" x="668" y="358" text-anchor="middle">HIP-3 Spot &amp;</text>
  <text class="ttl" x="668" y="380" text-anchor="middle">Lending</text>
  <text class="sub" x="668" y="402" text-anchor="middle">Felix · TradeXYZ · Hyena</text>
  <text class="sub" x="668" y="420" text-anchor="middle">Markets.xyz · HyperEVM lending</text>

  <!-- ARROW: Perps → Funding Rate -->
  <line x1="765" y1="140" x2="818" y2="140" stroke="#34C759" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ARROW: Spot → Ecosystem Yield -->
  <line x1="765" y1="380" x2="818" y2="380" stroke="#34C759" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- BOX: Funding Rate -->
  <rect class="box" x="820" y="95" width="180" height="90"/>
  <text class="lbl" x="910" y="118" text-anchor="middle">YIELD SOURCE</text>
  <text class="ttl" x="910" y="145" text-anchor="middle">Funding Rate</text>
  <text class="sub" x="910" y="167" text-anchor="middle">Longs pay shorts</text>

  <!-- BOX: Ecosystem Yield -->
  <rect class="box" x="820" y="330" width="180" height="105"/>
  <text class="lbl" x="910" y="355" text-anchor="middle">YIELD SOURCE</text>
  <text class="ttl" x="910" y="380" text-anchor="middle">Ecosystem Yield</text>
  <text class="sub" x="910" y="402" text-anchor="middle">Lending · Staking · LP</text>
  <text class="sub" x="910" y="418" text-anchor="middle">+ partner protocol points</text>

  <!-- ARROWS → APY box -->
  <path d="M1000 140 L1030 140 L1030 225 L1048 225" stroke="#34C759" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M1000 380 L1030 380 L1030 275 L1048 275" stroke="#34C759" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- BOX: Net APY (highlight) -->
  <rect class="box-hl" x="1050" y="190" width="80" height="130"/>
  <text class="lbl" x="1090" y="215" text-anchor="middle">NET APY</text>
  <text fill="#173132" font-family="'Aeonik', sans-serif" font-size="44" font-weight="800" x="1090" y="268" text-anchor="middle">7–</text>
  <text fill="#173132" font-family="'Aeonik', sans-serif" font-size="36" font-weight="800" x="1090" y="298" text-anchor="middle">10</text>
  <text class="sub" x="1090" y="314" text-anchor="middle" style="font-size:10px">% APY</text>

  <!-- RETURN PATH: NET APY → Receipt Token -->
  <path d="M1090 190 L1090 72 L435 72" stroke="#34C759" stroke-width="1.2" stroke-dasharray="6 4" fill="none" marker-end="url(#arr)"/>
  <text class="flow" x="760" y="63">yield accrues via exchange rate</text>

  <!-- RETURN PATH: Receipt Token → User -->
  <path d="M240 72 L110 72 L110 200" stroke="#34C759" stroke-width="1.2" stroke-dasharray="6 4" fill="none" marker-end="url(#arr)"/>
  <text class="flow" x="160" y="63">user holds</text>

</svg>
