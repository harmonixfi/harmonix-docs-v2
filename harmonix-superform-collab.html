<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 1200px;
    background: #f0f4f0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', 'Inter', sans-serif;
    overflow: hidden;
  }

  .canvas {
    width: 1200px;
    height: 1200px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 30% 40%, rgba(255,255,255,0.95) 0%, rgba(230,245,235,0.85) 50%, rgba(180,220,190,0.6) 100%);
  }

  /* Glass blobs background */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
  }
  .blob1 { width: 500px; height: 500px; background: #00c896; top: -100px; left: -100px; }
  .blob2 { width: 400px; height: 400px; background: #7dffb0; bottom: 50px; right: 50px; }
  .blob3 { width: 300px; height: 300px; background: #c8f5e0; top: 50%; left: 50%; transform: translate(-50%,-50%); }

  .coins-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: -60px;
    position: relative;
    z-index: 10;
  }

  /* COIN BASE */
  .coin {
    width: 380px;
    height: 380px;
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 40px 80px rgba(0,0,0,0.18)) drop-shadow(0 8px 24px rgba(0,0,0,0.12));
  }

  /* HARMONIX COIN — dark teal glass */
  .coin-harmonix {
    transform: perspective(800px) rotateY(28deg) rotateX(-5deg);
    margin-right: -50px;
    z-index: 2;
  }

  .coin-harmonix .coin-face {
    width: 380px;
    height: 380px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a2e28 0%, #0d1f1a 40%, #0a1a15 100%);
    border: 2.5px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .coin-harmonix .coin-face::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    border-radius: 50% 50% 0 0 / 50% 50% 0 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.02) 100%);
    pointer-events: none;
  }

  /* inner glow ring */
  .coin-harmonix .coin-face::after {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    border: 1.5px solid rgba(0,200,150,0.2);
    pointer-events: none;
  }

  /* coin edge / depth */
  .coin-harmonix .coin-edge {
    position: absolute;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    background: linear-gradient(90deg, #051510 0%, #0a2018 50%, #051510 100%);
    transform: translateX(18px) translateY(22px);
    z-index: -1;
    filter: blur(2px);
  }

  /* SUPERFORM COIN — bright green glass */
  .coin-superform {
    transform: perspective(800px) rotateY(-28deg) rotateX(-5deg);
    margin-left: -50px;
    z-index: 1;
  }

  .coin-superform .coin-face {
    width: 380px;
    height: 380px;
    border-radius: 50%;
    background: linear-gradient(135deg, #b8f040 0%, #9CE500 40%, #7ab800 100%);
    border: 2.5px solid rgba(255,255,255,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .coin-superform .coin-face::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    border-radius: 50% 50% 0 0 / 50% 50% 0 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.05) 100%);
    pointer-events: none;
  }

  .coin-superform .coin-face::after {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.25);
    pointer-events: none;
  }

  .coin-superform .coin-edge {
    position: absolute;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    background: linear-gradient(90deg, #5a8800 0%, #7aaa00 50%, #5a8800 100%);
    transform: translateX(18px) translateY(22px);
    z-index: -1;
    filter: blur(2px);
  }

  /* LOGO SIZING */
  .harmonix-logo svg {
    width: 170px;
    height: auto;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 0 18px rgba(0,200,140,0.5));
  }

  /* Superform stacked circles logo */
  .superform-logo {
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 0 18px rgba(0,80,20,0.3));
  }

  /* x connector badge */
  .x-badge {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 2px solid rgba(255,255,255,0.8);
    box-shadow: 0 8px 32px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 800;
    color: #1a2e28;
    letter-spacing: -1px;
  }

  /* bottom text */
  .bottom-text {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
  }

  .bottom-text .tagline {
    font-size: 26px;
    font-weight: 700;
    color: #1a2e28;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .bottom-text .sub {
    font-size: 18px;
    color: rgba(26,46,40,0.55);
    margin-top: 8px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* top label */
  .top-label {
    position: absolute;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 50px;
    padding: 10px 28px;
    font-size: 16px;
    font-weight: 600;
    color: #1a2e28;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
</style>
</head>
